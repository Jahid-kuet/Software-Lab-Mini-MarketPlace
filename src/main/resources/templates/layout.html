<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mini Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex;
              justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; padding: 20px;
                margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .btn { padding: 8px 16px; border: none; border-radius: 4px;
               cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger  { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .alert-success { background: #d4edda; color: #155724; padding: 12px;
                         border-radius: 4px; margin-bottom: 16px; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 12px;
                       border-radius: 4px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left;
                 border-bottom: 1px solid #dee2e6; }
        th { background: #343a40; color: white; }
        .products-grid { display: grid;
                         grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                         gap: 20px; }
        .product-card { background: white; border-radius: 8px; padding: 16px;
                        box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .price { font-size: 1.3rem; font-weight: bold; color: #28a745; }
        form input, form select, form textarea {
            width: 100%; padding: 8px; margin: 6px 0 14px 0;
            border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        label { font-weight: bold; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" style="font-size:1.2rem; font-weight:bold;">🛒 Mini Marketplace</a>
    <div>
        <a th:href="@{/products}">Products</a>
        <span sec:authorize="isAuthenticated()">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/auth/logout}">Logout
                (<span sec:authentication="name"></span>)
            </a>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/auth/login}">Login</a>
            <a th:href="@{/auth/register}">Register</a>
        </span>
    </div>
</nav>
<div class="container">
    <th:block th:replace="${layout_content}"></th:block>
</div>
</body>
</html>
