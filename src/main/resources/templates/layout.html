<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #a5b4fc;
            --accent: #06b6d4; --accent-dark: #0891b2;
            --success: #10b981; --success-light: #d1fae5;
            --danger: #ef4444; --danger-light: #fee2e2;
            --warning: #f59e0b; --warning-light: #fef3c7;
            --info: #3b82f6; --info-light: #dbeafe;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b;
            --gray-600: #475569; --gray-700: #334155; --gray-800: #1e293b;
            --gray-900: #0f172a;
            --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 40px -5px rgba(0,0,0,0.1);
            --transition: all 0.2s cubic-bezier(.4,0,.2,1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
               background: var(--gray-50); color: var(--gray-800); line-height: 1.6;
               min-height: 100vh; }

        /* ─── NAVBAR ─── */
        nav.navbar {
            background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 100%);
            padding: 0 32px; height: 64px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }
        .nav-brand { display: flex; align-items: center; gap: 10px;
                     text-decoration: none; color: white; font-weight: 700; font-size: 1.15rem; }
        .nav-brand i { font-size: 1.4rem; color: var(--primary-light); }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-links a { color: var(--gray-300); text-decoration: none; padding: 8px 14px;
                       border-radius: 8px; font-size: 0.88rem; font-weight: 500;
                       transition: var(--transition); }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-links .nav-user { display: flex; align-items: center; gap: 8px;
                               background: rgba(99,102,241,0.2); padding: 6px 14px;
                               border-radius: 20px; color: var(--primary-light);
                               font-weight: 600; font-size: 0.85rem; margin-left: 4px; }
        .nav-links .nav-user i { font-size: 0.9rem; }
        .nav-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                   color: white !important; padding: 8px 18px !important;
                   border-radius: 8px !important; font-weight: 600 !important; }
        .nav-btn:hover { opacity: 0.9; transform: translateY(-1px);
                         box-shadow: 0 4px 12px rgba(99,102,241,0.4); }

        /* ─── MAIN CONTAINER ─── */
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }

        /* ─── CARDS ─── */
        .card { background: white; border-radius: var(--radius-lg); padding: 28px;
                box-shadow: var(--shadow); border: 1px solid var(--gray-100);
                transition: var(--transition); }
        .card:hover { box-shadow: var(--shadow-lg); }

        /* ─── BUTTONS ─── */
        .btn { padding: 10px 20px; border: none; border-radius: var(--radius);
               cursor: pointer; text-decoration: none; display: inline-flex;
               align-items: center; gap: 8px; font-size: 0.88rem; font-weight: 600;
               font-family: inherit; transition: var(--transition); line-height: 1.4; }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                       color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.3); }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669);
                       color: white; box-shadow: 0 2px 8px rgba(16,185,129,0.3); }
        .btn-success:hover { box-shadow: 0 4px 16px rgba(16,185,129,0.4); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626);
                      color: white; box-shadow: 0 2px 8px rgba(239,68,68,0.3); }
        .btn-danger:hover { box-shadow: 0 4px 16px rgba(239,68,68,0.4); }
        .btn-warning { background: linear-gradient(135deg, var(--warning), #d97706);
                       color: white; box-shadow: 0 2px 8px rgba(245,158,11,0.3); }
        .btn-warning:hover { box-shadow: 0 4px 16px rgba(245,158,11,0.4); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700);
                         border: 1px solid var(--gray-200); }
        .btn-secondary:hover { background: var(--gray-200); }
        .btn-outline { background: transparent; border: 2px solid white;
                       color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.15); }
        .btn-sm { padding: 6px 14px; font-size: 0.82rem; border-radius: 8px; }
        .btn-lg { padding: 14px 28px; font-size: 1rem; border-radius: var(--radius); }

        /* ─── ALERTS ─── */
        .alert { padding: 14px 18px; border-radius: var(--radius); margin-bottom: 20px;
                 font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .alert i { font-size: 1.1rem; }
        .alert-success { background: var(--success-light); color: #065f46;
                         border: 1px solid #a7f3d0; }
        .alert-error { background: var(--danger-light); color: #991b1b;
                       border: 1px solid #fca5a5; }

        /* ─── TABLES ─── */
        .table-wrapper { background: white; border-radius: var(--radius-lg);
                         box-shadow: var(--shadow); overflow: hidden;
                         border: 1px solid var(--gray-100); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--gray-50); color: var(--gray-600); padding: 14px 18px;
             text-align: left; font-size: 0.78rem; font-weight: 700;
             text-transform: uppercase; letter-spacing: 0.05em;
             border-bottom: 2px solid var(--gray-200); }
        td { padding: 14px 18px; border-bottom: 1px solid var(--gray-100);
             font-size: 0.9rem; color: var(--gray-700); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--gray-50); }

        /* ─── FORMS ─── */
        form input, form select, form textarea {
            width: 100%; padding: 12px 14px; margin: 6px 0 18px 0;
            border: 2px solid var(--gray-200); border-radius: var(--radius);
            font-size: 0.9rem; font-family: inherit; color: var(--gray-800);
            transition: var(--transition); background: white;
            box-sizing: border-box; }
        form input:focus, form select:focus, form textarea:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        label { font-weight: 600; font-size: 0.88rem; color: var(--gray-700);
                margin-bottom: 4px; display: block; }

        /* ─── PRODUCTS GRID ─── */
        .products-grid { display: grid;
                         grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                         gap: 24px; }
        .product-card { background: white; border-radius: var(--radius-lg); padding: 0;
                        box-shadow: var(--shadow); border: 1px solid var(--gray-100);
                        transition: var(--transition); overflow: hidden; }
        .product-card:hover { box-shadow: var(--shadow-xl); transform: translateY(-4px); }
        .product-card-body { padding: 20px; }
        .product-card h3 { font-size: 1.05rem; font-weight: 700; color: var(--gray-800);
                           margin-bottom: 8px; }
        .product-card .desc { color: var(--gray-500); font-size: 0.85rem;
                              margin-bottom: 12px; line-height: 1.5;
                              display: -webkit-box; -webkit-line-clamp: 2;
                              -webkit-box-orient: vertical; overflow: hidden; }
        .product-card .product-meta { display: flex; justify-content: space-between;
                                      align-items: center; margin-bottom: 14px; }

        /* ─── PRICE ─── */
        .price { font-size: 1.4rem; font-weight: 800;
                 background: linear-gradient(135deg, var(--success), #059669);
                 -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                 background-clip: text; }

        /* ─── BADGE ─── */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem;
                 font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .badge-category { background: var(--info-light); color: #1d4ed8; }
        .badge-active { background: var(--success-light); color: #065f46; }
        .badge-inactive { background: var(--danger-light); color: #991b1b; }
        .badge-pending   { background: var(--warning-light); color: #92400e; }
        .badge-confirmed { background: var(--info-light); color: #1e40af; }
        .badge-shipped   { background: #ede9fe; color: #5b21b6; }
        .badge-delivered { background: var(--success-light); color: #065f46; }
        .badge-cancelled { background: var(--danger-light); color: #991b1b; }

        /* ─── SECTION HEADERS ─── */
        .section-header { display: flex; justify-content: space-between; align-items: center;
                          margin-bottom: 24px; }
        .section-header h2 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); }

        /* ─── EMPTY STATE ─── */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; display: block; }
        .empty-state p { font-size: 1rem; }
        .empty-state a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .empty-state a:hover { text-decoration: underline; }

        /* ─── ERROR MSG ─── */
        .error-msg { color: var(--danger); font-size: 0.82rem; margin-top: -12px;
                     margin-bottom: 10px; font-weight: 500; }

        /* ─── FOOTER ─── */
        footer { background: var(--gray-900); color: var(--gray-400); text-align: center;
                 padding: 24px; margin-top: 60px; font-size: 0.85rem; }
        footer a { color: var(--primary-light); text-decoration: none; }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); }
                              to { opacity:1; transform:translateY(0); } }
        .animate-in { animation: fadeInUp 0.4s ease-out; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            nav.navbar { padding: 0 16px; }
            .nav-links { gap: 2px; }
            .nav-links a { padding: 6px 8px; font-size: 0.82rem; }
            .container { padding: 0 16px; margin: 20px auto; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/}" class="nav-brand">
        <i class="fas fa-store"></i> Mini Marketplace
    </a>
    <div class="nav-links">
        <a th:href="@{/products}"><i class="fas fa-compass"></i> Explore</a>
        <span sec:authorize="isAuthenticated()">
            <a th:href="@{/dashboard}"><i class="fas fa-th-large"></i> Dashboard</a>
            <span class="nav-user">
                <i class="fas fa-user-circle"></i>
                <span sec:authentication="name"></span>
            </span>
            <a th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/auth/login}"><i class="fas fa-sign-in-alt"></i> Login</a>
            <a th:href="@{/auth/register}" class="nav-btn"><i class="fas fa-user-plus"></i> Register</a>
        </span>
    </div>
</nav>
<div class="container animate-in">
    <th:block th:replace="${layout_content}"></th:block>
</div>
<footer>
    <p>&copy; 2026 Mini Marketplace. Built with <i class="fas fa-heart" style="color:var(--danger);"></i> using Spring Boot &amp; Thymeleaf</p>
</footer>
</body>
</html>
