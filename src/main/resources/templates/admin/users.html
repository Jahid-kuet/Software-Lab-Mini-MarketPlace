<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer;
               text-decoration: none; display: inline-block; font-size: 0.85rem; }
        .btn-warning  { background: #ffc107; color: #212529; }
        .btn-success  { background: #28a745; color: white; }
        .alert-success { background: #d4edda; color: #155724; padding: 12px;
                         border-radius: 4px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: white;
                border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { background: #343a40; color: white; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/admin}" style="font-size:1.2rem; font-weight:bold;">🛒 Admin Panel</a>
    <div>
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/admin/products}">Products</a>
        <a th:href="@{/admin/orders}">Orders</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</nav>
<div class="container">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <h2>Manage Users</h2>
    <table>
        <thead>
            <tr><th>ID</th><th>Username</th><th>Email</th><th>Full Name</th><th>Roles</th><th>Status</th><th>Action</th></tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.username}">username</td>
                <td th:text="${user.email}">email</td>
                <td th:text="${user.fullName}">Name</td>
                <td th:text="${user.roles}">ROLE</td>
                <td>
                    <span th:if="${user.enabled}" style="color:#28a745;font-weight:bold;">Active</span>
                    <span th:unless="${user.enabled}" style="color:#dc3545;font-weight:bold;">Disabled</span>
                </td>
                <td>
                    <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post"
                          style="display:inline;">
                        <button type="submit"
                                th:class="${user.enabled} ? 'btn btn-warning' : 'btn btn-success'"
                                th:text="${user.enabled} ? 'Disable' : 'Enable'">Toggle</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
