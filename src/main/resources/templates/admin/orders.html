<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Orders - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer;
               text-decoration: none; display: inline-block; font-size: 0.85rem; }
        .btn-primary { background: #007bff; color: white; }
        .alert-success { background: #d4edda; color: #155724; padding: 12px;
                         border-radius: 4px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: white;
                border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { background: #343a40; color: white; }
        select { padding: 6px; border: 1px solid #ced4da; border-radius: 4px; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/admin}" style="font-size:1.2rem; font-weight:bold;">🛒 Admin Panel</a>
    <div>
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/products}">Products</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</nav>
<div class="container">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <h2>Manage Orders</h2>
    <table>
        <thead>
            <tr><th>Order ID</th><th>Buyer</th><th>Total</th><th>Date</th><th>Status</th><th>Update Status</th></tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="'#' + ${order.id}">#1</td>
                <td th:text="${order.buyerUsername}">buyer</td>
                <td th:text="'$' + ${order.totalAmount}">$0</td>
                <td th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">Date</td>
                <td th:text="${order.status}">PENDING</td>
                <td>
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post"
                          style="display:flex; gap:6px;">
                        <select name="status">
                            <option value="PENDING">PENDING</option>
                            <option value="CONFIRMED">CONFIRMED</option>
                            <option value="SHIPPED">SHIPPED</option>
                            <option value="DELIVERED">DELIVERED</option>
                            <option value="CANCELLED">CANCELLED</option>
                        </select>
                        <button type="submit" class="btn btn-primary">Update</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
