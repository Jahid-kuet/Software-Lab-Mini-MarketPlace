<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mini Marketplace - Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .hero { text-align: center; padding: 60px 20px; background: #007bff; color: white; border-radius: 8px; margin-bottom: 30px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .price { font-size: 1.2rem; font-weight: bold; color: #28a745; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #007bff; color: white; }
        .btn-outline { border: 1px solid #007bff; color: #007bff; background: white; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" style="font-size:1.2rem; font-weight:bold;">🛒 Mini Marketplace</a>
    <div>
        <a th:href="@{/products}">Products</a>
        <span sec:authorize="isAuthenticated()">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/auth/logout}">Logout (<span sec:authentication="name"></span>)</a>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/auth/login}">Login</a>
            <a th:href="@{/auth/register}">Register</a>
        </span>
    </div>
</nav>
<div class="container">
    <div class="hero">
        <h1>Welcome to Mini Marketplace</h1>
        <p>Buy and sell products online with ease.</p>
        <a th:href="@{/products}" class="btn btn-outline" style="border-color:white;color:white;">Browse Products</a>
    </div>
    <h2>Latest Products</h2>
    <div class="products-grid">
        <div class="product-card" th:each="product : ${products}">
            <h3 th:text="${product.name}">Product Name</h3>
            <p th:text="${product.description}">Description</p>
            <p class="price" th:text="'$' + ${product.price}">$0.00</p>
            <p>Stock: <span th:text="${product.stockQuantity}">0</span></p>
            <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-primary">View Details</a>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(products)}" style="text-align:center; padding:40px; color:#6c757d;">
        <p>No products available yet.</p>
    </div>
</div>
</body>
</html>
