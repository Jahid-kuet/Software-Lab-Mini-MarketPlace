<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Product - Mini Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 10px; margin-bottom: 14px;
                                   border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;
               text-decoration: none; display: inline-block; }
        .btn-success { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .error-msg { color: #dc3545; font-size: 0.85rem; margin-top: -10px; margin-bottom: 8px; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 12px;
                       border-radius: 4px; margin-bottom: 16px; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" style="font-size:1.2rem; font-weight:bold;">🛒 Mini Marketplace</a>
    <div>
        <a th:href="@{/products/my}">My Products</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h2>Create New Product</h2>
        <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>
        <form th:action="@{/products/create}" method="post" th:object="${productRequest}">
            <label>Product Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter product name"/>
            <div class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

            <label>Description</label>
            <textarea th:field="*{description}" rows="3" placeholder="Product description"></textarea>

            <label>Price ($)</label>
            <input type="number" th:field="*{price}" step="0.01" min="0.01" placeholder="0.00"/>
            <div class="error-msg" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>

            <label>Stock Quantity</label>
            <input type="number" th:field="*{stockQuantity}" min="0" placeholder="0"/>
            <div class="error-msg" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>

            <label>Category</label>
            <input type="text" th:field="*{category}" placeholder="e.g. Electronics, Clothing"/>

            <button type="submit" class="btn btn-success">Create Product</button>
            <a th:href="@{/products/my}" class="btn btn-secondary" style="margin-left:10px;">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
