<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - Mini Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --gray-50: #f8fafc;
                --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-400: #94a3b8;
                --gray-500: #64748b; --gray-700: #334155; --gray-800: #1e293b;
                --gray-900: #0f172a; --success: #10b981; --radius: 12px; --radius-lg: 16px; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-800); }
        nav { background: linear-gradient(135deg, var(--gray-900), #1e1b4b);
              padding: 16px 32px; display: flex; justify-content: space-between;
              align-items: center; position: sticky; top: 0; z-index: 100;
              box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .nav-brand { color: white; text-decoration: none; font-size: 1.2rem;
                     font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .nav-brand i { color: #a5b4fc; }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none;
                       padding: 8px 16px; border-radius: 8px; font-size: 0.9rem;
                       font-weight: 500; transition: all 0.2s; }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: white; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
        .product-detail { background: white; border-radius: var(--radius-lg);
                          overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
                          border: 1px solid var(--gray-200); }
        .detail-header { background: linear-gradient(135deg, #eef2ff, #e0e7ff, #c7d2fe);
                         padding: 48px; display: flex; align-items: center;
                         justify-content: center; }
        .detail-header i { font-size: 4rem; color: var(--primary); }
        .detail-body { padding: 36px; }
        .detail-body h1 { font-size: 1.8rem; font-weight: 800; color: var(--gray-900);
                          margin-bottom: 12px; }
        .detail-desc { color: var(--gray-500); font-size: 1rem; line-height: 1.7;
                       margin-bottom: 24px; }
        .detail-price { font-size: 2.2rem; font-weight: 800;
                        background: linear-gradient(135deg, var(--primary), #8b5cf6);
                        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                        margin-bottom: 24px; }
        .detail-meta { display: grid; grid-template-columns: 1fr 1fr;
                       gap: 16px; margin-bottom: 28px; }
        .meta-item { background: var(--gray-50); padding: 16px; border-radius: var(--radius); }
        .meta-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;
                      font-weight: 600; color: var(--gray-500); margin-bottom: 4px; }
        .meta-value { font-size: 1.05rem; font-weight: 700; color: var(--gray-900); }
        .meta-value i { margin-right: 6px; color: var(--primary); }
        .detail-actions { display: flex; gap: 12px; padding-top: 20px;
                          border-top: 1px solid var(--gray-200); }
        .btn { padding: 12px 24px; border: none; border-radius: var(--radius);
               cursor: pointer; text-decoration: none; display: inline-flex;
               align-items: center; gap: 8px; font-family: inherit;
               font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                       color: white; }
        .btn-primary:hover { transform: translateY(-2px);
                             box-shadow: 0 6px 20px rgba(99,102,241,0.35); }
        .btn-ghost { background: var(--gray-100); color: var(--gray-700); }
        .btn-ghost:hover { background: var(--gray-200); }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); }
                              to { opacity:1; transform:translateY(0); } }
        .container { animation: fadeInUp 0.4s ease-out; }
        @media (max-width: 768px) {
            nav { padding: 12px 16px; flex-direction: column; gap: 12px; }
            .detail-meta { grid-template-columns: 1fr; }
            .detail-actions { flex-direction: column; }
            .detail-actions .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" class="nav-brand"><i class="fas fa-store"></i> Mini Marketplace</a>
    <div class="nav-links">
        <a th:href="@{/products}"><i class="fas fa-box"></i> Products</a>
        <span sec:authorize="isAuthenticated()">
            <a th:href="@{/dashboard}"><i class="fas fa-th-large"></i> Dashboard</a>
            <a th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/auth/login}"><i class="fas fa-sign-in-alt"></i> Login</a>
        </span>
    </div>
</nav>
<div class="container">
    <div class="product-detail">
        <div class="detail-header"><i class="fas fa-box-open"></i></div>
        <div class="detail-body">
            <h1 th:text="${product.name}">Product Name</h1>
            <p class="detail-desc" th:text="${product.description}">Description</p>
            <div class="detail-price" th:text="'$' + ${product.price}">$0.00</div>
            <div class="detail-meta">
                <div class="meta-item">
                    <div class="meta-label">Category</div>
                    <div class="meta-value"><i class="fas fa-tag"></i> <span th:text="${product.category}">-</span></div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Stock Available</div>
                    <div class="meta-value"><i class="fas fa-cubes"></i> <span th:text="${product.stockQuantity}">0</span></div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Seller</div>
                    <div class="meta-value"><i class="fas fa-user"></i> <span th:text="${product.sellerUsername}">seller</span></div>
                </div>
            </div>
            <div class="detail-actions">
                <sec:authorize access="hasRole('BUYER')">
                    <a th:href="@{/orders/checkout}" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> Buy Now</a>
                </sec:authorize>
                <a th:href="@{/products}" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back to Products</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
