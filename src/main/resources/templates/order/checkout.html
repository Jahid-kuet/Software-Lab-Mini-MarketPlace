<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Mini Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 10px; margin-bottom: 14px;
                        border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;
               text-decoration: none; display: inline-block; }
        .btn-success { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 12px;
                       border-radius: 4px; margin-bottom: 16px; }
        .item-row { background: #f8f9fa; padding: 16px; border-radius: 6px; margin-bottom: 12px; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" style="font-size:1.2rem; font-weight:bold;">🛒 Mini Marketplace</a>
    <div>
        <a th:href="@{/products}">Products</a>
        <a th:href="@{/orders}">My Orders</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h2>Place an Order</h2>
        <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>
        <form th:action="@{/orders/place}" method="post">
            <div class="item-row">
                <label>Select Product</label>
                <select name="items[0].productId">
                    <option value="">-- Select a Product --</option>
                    <option th:each="product : ${products}"
                            th:value="${product.id}"
                            th:text="${product.name} + ' ($' + ${product.price} + ') - Stock: ' + ${product.stockQuantity}">
                    </option>
                </select>
                <label>Quantity</label>
                <input type="number" name="items[0].quantity" min="1" value="1"/>
            </div>
            <button type="submit" class="btn btn-success">Place Order</button>
            <a th:href="@{/products}" class="btn btn-secondary" style="margin-left:10px;">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
