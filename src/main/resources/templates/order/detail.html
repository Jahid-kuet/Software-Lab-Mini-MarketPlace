<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Detail - Mini Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --gray-50: #f8fafc;
                --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-400: #94a3b8;
                --gray-500: #64748b; --gray-700: #334155; --gray-800: #1e293b;
                --gray-900: #0f172a; --success: #10b981; --radius: 12px; --radius-lg: 16px; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-800); }
        nav { background: linear-gradient(135deg, var(--gray-900), #1e1b4b);
              padding: 16px 32px; display: flex; justify-content: space-between;
              align-items: center; position: sticky; top: 0; z-index: 100;
              box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .nav-brand { color: white; text-decoration: none; font-size: 1.2rem;
                     font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .nav-brand i { color: #a5b4fc; }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none;
                       padding: 8px 16px; border-radius: 8px; font-size: 0.9rem;
                       font-weight: 500; transition: all 0.2s; }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: white; }
        .container { max-width: 850px; margin: 0 auto; padding: 40px 24px; }
        .card { background: white; border-radius: var(--radius-lg); overflow: hidden;
                box-shadow: 0 4px 16px rgba(0,0,0,0.06); border: 1px solid var(--gray-200); }
        .card-top { padding: 32px 36px; }
        .order-header { display: flex; justify-content: space-between;
                        align-items: flex-start; flex-wrap: wrap; gap: 16px;
                        margin-bottom: 20px; }
        .order-title { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .order-title i { color: var(--primary); margin-right: 6px; }
        .badge { padding: 6px 16px; border-radius: 20px; font-size: 0.82rem;
                 font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge-pending   { background: #fef3c7; color: #92400e; }
        .badge-confirmed { background: #dbeafe; color: #1e40af; }
        .badge-shipped   { background: #d1fae5; color: #065f46; }
        .badge-delivered { background: var(--success); color: white; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }
        .order-info { color: var(--gray-500); font-size: 0.9rem;
                      display: flex; align-items: center; gap: 6px; }
        .order-info i { color: var(--gray-400); }
        .table-wrapper { border-top: 1px solid var(--gray-200); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--gray-50); color: var(--gray-700);
             padding: 12px 36px; text-align: left; font-size: 0.82rem;
             font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 14px 36px; border-bottom: 1px solid var(--gray-100);
             font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        .total-row { background: linear-gradient(135deg, #eef2ff, #e0e7ff);
                     padding: 20px 36px; display: flex; justify-content: flex-end;
                     align-items: center; gap: 8px;
                     border-top: 2px solid var(--gray-200); }
        .total-label { font-size: 1rem; font-weight: 600; color: var(--gray-700); }
        .total-value { font-size: 1.5rem; font-weight: 800;
                       background: linear-gradient(135deg, var(--primary), #8b5cf6);
                       -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-bottom { padding: 20px 36px; border-top: 1px solid var(--gray-200); }
        .btn { padding: 10px 20px; border: none; border-radius: var(--radius);
               cursor: pointer; text-decoration: none; display: inline-flex;
               align-items: center; gap: 8px; font-family: inherit;
               font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
        .btn-ghost { background: var(--gray-100); color: var(--gray-700); }
        .btn-ghost:hover { background: var(--gray-200); }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); }
                              to { opacity:1; transform:translateY(0); } }
        .container { animation: fadeInUp 0.4s ease-out; }
        @media (max-width: 768px) {
            nav { padding: 12px 16px; flex-direction: column; gap: 12px; }
            th, td { padding: 10px 16px; }
            .total-row, .card-top, .card-bottom { padding-left: 16px; padding-right: 16px; }
        }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" class="nav-brand"><i class="fas fa-store"></i> Mini Marketplace</a>
    <div class="nav-links">
        <a th:href="@{/orders}"><i class="fas fa-receipt"></i> My Orders</a>
        <a th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <div class="card-top">
            <div class="order-header">
                <h2 class="order-title"><i class="fas fa-receipt"></i> Order <span th:text="'#' + ${order.id}">#1</span></h2>
                <span th:class="'badge badge-' + ${#strings.toLowerCase(order.status)}"
                      th:text="${order.status}">PENDING</span>
            </div>
            <div class="order-info">
                <i class="fas fa-calendar-alt"></i> Placed on <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}">Date</span>
            </div>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Product</th><th>Unit Price</th><th>Qty</th><th>Subtotal</th></tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.items}">
                        <td th:text="${item.productName}">Product</td>
                        <td th:text="'$' + ${item.unitPrice}">$0</td>
                        <td th:text="${item.quantity}">1</td>
                        <td style="font-weight:700;" th:text="'$' + ${item.subtotal}">$0</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="total-row">
            <span class="total-label">Total:</span>
            <span class="total-value">$<span th:text="${order.totalAmount}">0.00</span></span>
        </div>
        <div class="card-bottom">
            <a th:href="@{/orders}" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back to Orders</a>
        </div>
    </div>
</div>
</body>
</html>
