<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Detail - Mini Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { background: #343a40; color: white; }
        .total { font-size: 1.3rem; font-weight: bold; color: #28a745; text-align: right; margin-top: 14px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;
               text-decoration: none; display: inline-block; }
        .btn-secondary { background: #6c757d; color: white; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" style="font-size:1.2rem; font-weight:bold;">🛒 Mini Marketplace</a>
    <div>
        <a th:href="@{/orders}">My Orders</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h2>Order <span th:text="'#' + ${order.id}">#1</span></h2>
        <p>Status: <strong th:text="${order.status}">PENDING</strong></p>
        <p>Placed: <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}">Date</span></p>
        <table>
            <thead>
                <tr><th>Product</th><th>Unit Price</th><th>Qty</th><th>Subtotal</th></tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.productName}">Product</td>
                    <td th:text="'$' + ${item.unitPrice}">$0</td>
                    <td th:text="${item.quantity}">1</td>
                    <td th:text="'$' + ${item.subtotal}">$0</td>
                </tr>
            </tbody>
        </table>
        <p class="total">Total: $<span th:text="${order.totalAmount}">0.00</span></p>
        <a th:href="@{/orders}" class="btn btn-secondary">← Back to Orders</a>
    </div>
</div>
</body>
</html>
