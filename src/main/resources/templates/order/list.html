<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders - Mini Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #343a40; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer;
               text-decoration: none; display: inline-block; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .alert-success { background: #d4edda; color: #155724; padding: 12px;
                         border-radius: 4px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: white;
                border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { background: #343a40; color: white; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .badge-pending   { background: #fff3cd; color: #856404; }
        .badge-confirmed { background: #cce5ff; color: #004085; }
        .badge-shipped   { background: #d4edda; color: #155724; }
        .badge-delivered { background: #28a745; color: white; }
        .badge-cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/}" style="font-size:1.2rem; font-weight:bold;">🛒 Mini Marketplace</a>
    <div>
        <a th:href="@{/products}">Browse Products</a>
        <a th:href="@{/orders/checkout}">Place Order</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</nav>
<div class="container">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>My Orders</h2>
        <a th:href="@{/orders/checkout}" class="btn btn-success">+ Place New Order</a>
    </div>
    <table>
        <thead>
            <tr><th>Order ID</th><th>Date</th><th>Total</th><th>Status</th><th>Details</th></tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="'#' + ${order.id}">#1</td>
                <td th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}">Date</td>
                <td th:text="'$' + ${order.totalAmount}">$0</td>
                <td>
                    <span th:class="'badge badge-' + ${#strings.toLowerCase(order.status)}"
                          th:text="${order.status}">PENDING</span>
                </td>
                <td><a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-primary">View</a></td>
            </tr>
        </tbody>
    </table>
    <div th:if="${#lists.isEmpty(orders)}" style="text-align:center;padding:40px;color:#6c757d;">
        <p>No orders yet. <a th:href="@{/products}">Browse products</a> to place an order!</p>
    </div>
</div>
</body>
</html>
