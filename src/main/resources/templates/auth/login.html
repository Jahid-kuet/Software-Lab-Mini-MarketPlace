<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mini Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --gray-100: #f1f5f9;
                --gray-200: #e2e8f0; --gray-500: #64748b; --gray-700: #334155;
                --gray-800: #1e293b; --gray-900: #0f172a;
                --success: #10b981; --danger: #ef4444; --radius: 12px; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex;
               justify-content: center; align-items: center;
               background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
               padding: 20px; }
        .login-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; }
        .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
                 color: white; font-size: 1.3rem; font-weight: 700; text-decoration: none; }
        .brand i { font-size: 1.6rem; color: #a5b4fc; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 100%;
                box-shadow: 0 25px 60px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 8px; font-size: 1.5rem;
             font-weight: 800; color: var(--gray-900); }
        .subtitle { text-align: center; color: var(--gray-500); font-size: 0.9rem;
                    margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; font-size: 0.88rem; color: var(--gray-700);
                display: block; margin-bottom: 6px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%;
                           transform: translateY(-50%); color: var(--gray-500); font-size: 0.9rem; }
        input { width: 100%; padding: 12px 14px 12px 42px;
                border: 2px solid var(--gray-200); border-radius: var(--radius);
                font-size: 0.9rem; font-family: inherit; color: var(--gray-800);
                transition: all 0.2s; background: white; }
        input:focus { outline: none; border-color: var(--primary);
                      box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius);
               cursor: pointer; font-size: 1rem; font-weight: 700; font-family: inherit;
               background: linear-gradient(135deg, var(--primary), var(--primary-dark));
               color: white; transition: all 0.2s; display: flex;
               align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { transform: translateY(-2px);
                     box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
        .alert { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 20px;
                 font-size: 0.88rem; font-weight: 500; display: flex;
                 align-items: center; gap: 8px; }
        .alert i { font-size: 1rem; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0;
                   color: var(--gray-500); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1;
                                             height: 1px; background: var(--gray-200); }
        .text-center { text-align: center; margin-top: 0; color: var(--gray-500);
                       font-size: 0.9rem; }
        .text-center a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .text-center a:hover { text-decoration: underline; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); }
                              to { opacity:1; transform:translateY(0); } }
        .login-wrapper { animation: fadeInUp 0.5s ease-out; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <a th:href="@{/}" class="brand"><i class="fas fa-store"></i> Mini Marketplace</a>
    <div class="card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue to your account</p>
        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> You have been logged out.
        </div>
        <div th:if="${successMessage}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>
        <form th:action="@{/auth/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Enter your username" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Enter your password" required/>
                </div>
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
        <div class="divider">or</div>
        <div class="text-center">
            Don't have an account? <a th:href="@{/auth/register}">Create one free</a>
        </div>
    </div>
</div>
</body>
</html>
